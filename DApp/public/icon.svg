<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="37" fill="#1a1f35"/>

  <!-- Paws on ledge -->
  <rect x="30" y="132" width="120" height="3" rx="1.5" fill="#3a3a3a"/>
  <!-- Left paw -->
  <g transform="translate(48, 118)">
    <ellipse cx="8" cy="10" rx="10" ry="8" fill="#F0A030"/>
    <circle cx="3" cy="7" r="3" fill="#F0A030"/>
    <circle cx="8" cy="5" r="3" fill="#F0A030"/>
    <circle cx="13" cy="7" r="3" fill="#F0A030"/>
    <ellipse cx="3" cy="7" rx="2" ry="2" fill="#D08820"/>
    <ellipse cx="8" cy="5" rx="2" ry="2" fill="#D08820"/>
    <ellipse cx="13" cy="7" rx="2" ry="2" fill="#D08820"/>
  </g>
  <!-- Right paw -->
  <g transform="translate(108, 118)">
    <ellipse cx="8" cy="10" rx="10" ry="8" fill="#F0A030"/>
    <circle cx="3" cy="7" r="3" fill="#F0A030"/>
    <circle cx="8" cy="5" r="3" fill="#F0A030"/>
    <circle cx="13" cy="7" r="3" fill="#F0A030"/>
    <ellipse cx="3" cy="7" rx="2" ry="2" fill="#D08820"/>
    <ellipse cx="8" cy="5" rx="2" ry="2" fill="#D08820"/>
    <ellipse cx="13" cy="7" rx="2" ry="2" fill="#D08820"/>
  </g>

  <!-- Head (black) -->
  <ellipse cx="90" cy="92" rx="48" ry="42" fill="#3a3a3a"/>

  <!-- Left ear -->
  <ellipse cx="50" cy="62" rx="18" ry="22" fill="#3a3a3a" transform="rotate(-15 50 62)"/>
  <!-- Right ear -->
  <ellipse cx="130" cy="62" rx="18" ry="22" fill="#3a3a3a" transform="rotate(15 130 62)"/>

  <!-- Tan face markings -->
  <!-- Muzzle -->
  <ellipse cx="90" cy="108" rx="28" ry="20" fill="#F0A030"/>
  <!-- Left cheek -->
  <ellipse cx="70" cy="100" rx="16" ry="14" fill="#F0A030"/>
  <!-- Right cheek -->
  <ellipse cx="110" cy="100" rx="16" ry="14" fill="#F0A030"/>

  <!-- Eyebrow dots (tan) -->
  <circle cx="72" cy="76" r="6" fill="#F0A030"/>
  <circle cx="108" cy="76" r="6" fill="#F0A030"/>

  <!-- Eyes (happy closed) -->
  <path d="M64 86 Q72 80 80 86" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M100 86 Q108 80 116 86" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <ellipse cx="90" cy="100" rx="7" ry="5.5" fill="#2a2a2a"/>

  <!-- Mouth -->
  <path d="M84 105 Q90 112 96 105" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Tongue -->
  <ellipse cx="90" cy="114" rx="6" ry="9" fill="#E87080"/>
  <path d="M87 112 Q90 110 93 112" fill="#D06070"/>
</svg>
